<!DOCTYPE html>
<html>
<head>
    <title>Auth Test - Abtirsi</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Supabase Auth Test</h1>
    <button id="googleBtn">Sign in with Google</button>
    <pre id="output">Loading...</pre>

    <script>
        // ========== REPLACE WITH YOUR ACTUAL KEYS ==========
        const SUPABASE_URL = 'YOUR_SUPABASE_URL_HERE';
        const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY_HERE';
        // ===================================================
        
        const output = document.getElementById('output');
        
        // Check if keys are configured
        if (SUPABASE_URL === 'YOUR_SUPABASE_URL_HERE') {
            output.innerHTML = '❌ ERROR: Please replace SUPABASE_URL with your actual Supabase URL';
        } else if (SUPABASE_ANON_KEY === 'YOUR_SUPABASE_ANON_KEY_HERE') {
            output.innerHTML = '❌ ERROR: Please replace SUPABASE_ANON_KEY with your actual anon key';
        } else {
            output.innerHTML = '✅ Keys configured. Initializing Supabase...';
            
            try {
                const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                output.innerHTML = '✅ Supabase client created. Ready to sign in.';
                
                document.getElementById('googleBtn').onclick = async () => {
                    output.innerHTML = '🔄 Attempting Google sign in...';
                    try {
                        const { data, error } = await supabase.auth.signInWithOAuth({ provider: 'google' });
                        if (error) throw error;
                        output.innerHTML = '✅ Redirecting to Google...';
                    } catch (err) {
                        output.innerHTML = '❌ Error: ' + err.message;
                    }
                };
                
            } catch (err) {
                output.innerHTML = '❌ Failed to create Supabase client: ' + err.message;
            }
        }
    </script>
</body>
</html>
